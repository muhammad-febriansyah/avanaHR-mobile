<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1800" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
<title>AvanaHR Leave and Payroll SVG Asset</title>
<desc>Raw scalable SVG onboarding illustration asset for AvanaHR Flutter HRIS app.</desc>

<defs>
  <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#2F6BFF"/>
    <stop offset="100%" stop-color="#0F4AD8"/>
  </linearGradient>
  <linearGradient id="blueSoft" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#EAF2FF"/>
    <stop offset="100%" stop-color="#F8FBFF"/>
  </linearGradient>
  <linearGradient id="navy" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0C2D67"/>
    <stop offset="100%" stop-color="#061A3F"/>
  </linearGradient>
  <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#103B83" flood-opacity="0.14"/>
  </filter>
  <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1E4EC9" flood-opacity="0.12"/>
  </filter>
  <style>
    .dark{fill:#071B45}.muted{fill:#6B7894}.line{stroke:#D8E5FF;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .blueStroke{stroke:#2363F6;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .card{fill:#FFFFFF;stroke:#DDE9FF;stroke-width:2;filter:url(#softShadow)}
    .micro{font-family:Arial, Helvetica, sans-serif;font-size:20px;fill:#5E6C89}.label{font-family:Arial, Helvetica, sans-serif;font-size:26px;font-weight:700;fill:#071B45}
    .small{font-family:Arial, Helvetica, sans-serif;font-size:18px;fill:#70809B}.whiteText{font-family:Arial, Helvetica, sans-serif;fill:#FFFFFF}
  </style>
</defs>

<rect width="1200" height="900" fill="none"/>
<ellipse cx="600" cy="510" rx="500" ry="320" fill="url(#blueSoft)" opacity="0.8"/>
<path d="M85 790 C250 700 385 820 550 735 C760 625 875 825 1120 710 L1120 900 L85 900 Z" fill="#E9F2FF" opacity=".7"/>
<path d="M120 720 C270 680 382 768 525 720 C731 652 850 760 1085 675" class="line" opacity=".5"/>

<g id="brand" transform="translate(430 42)">
  <g transform="translate(0 0) scale(.9)">
    <path d="M27 96 L78 5 Q84 -6 94 5 L156 140 L119 140 L100 96 Q96 87 87 87 H77 Q67 87 63 97 L43 140 H8 Z" fill="url(#blue)"/>
    <rect x="170" y="0" width="42" height="140" rx="10" fill="url(#blue)"/>
    <circle cx="109" cy="82" r="22" fill="#FFFFFF"/>
    <circle cx="109" cy="82" r="15" fill="#6EA0FF"/>
    <path d="M42 109 C88 83 161 78 230 121" stroke="#79A8FF" stroke-width="17" fill="none" stroke-linecap="round" opacity=".9"/>
  </g>
  <text x="215" y="86" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="500" fill="#071B45">Avana</text>
  <text x="435" y="86" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="500" fill="#2F6BFF">HR</text>
  <text x="220" y="122" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#40506D">Advancing People, Empowering Growth</text>
</g>

