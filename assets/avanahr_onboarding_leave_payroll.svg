  <text x="108" y="361" class="label" font-size="22">May 28 - May 31</text><rect x="218" y="340" width="65" height="31" rx="10" fill="#DFF8EA"/><text x="226" y="361" font-family="Arial" font-size="15" font-weight="700" fill="#159451">Approved</text>
  <circle cx="75" cy="405" r="15" fill="#EEF5FF" stroke="#2363F6" stroke-width="4"/><text x="108" y="409" class="label" font-size="22">Jun 10 - Jun 11</text><rect x="224" y="389" width="59" height="31" rx="10" fill="#EEF5FF"/><text x="234" y="410" font-family="Arial" font-size="15" font-weight="700" fill="#2363F6">Pending</text>
  <rect x="38" y="460" width="264" height="110" rx="24" fill="url(#blue)"/>
  <text x="62" y="496" class="whiteText" font-size="23" font-weight="700">Payroll Overview</text><text x="62" y="531" class="whiteText" font-size="20" opacity=".85">Net Pay</text><text x="62" y="562" class="whiteText" font-size="35" font-weight="700">$2,850</text>
