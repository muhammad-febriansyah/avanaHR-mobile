org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Old plugins pin Java to 1.8 while Kotlin defaults to the JDK (21) target.
# The 1.8 bytecode runs fine on the newer runtime, so downgrade the hard
# mismatch check to a warning instead of failing the build.
kotlin.jvm.target.validation.mode=warning
